name: CU News Bot

on:
  schedule:
    - cron: "*/15 * * * *"  # প্রতি 15 মিনিটে
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      -  - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }} # এই লাইনটি যোগ করতে হবে
        run: python main.py
